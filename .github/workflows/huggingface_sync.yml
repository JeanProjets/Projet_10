name: Sync to Hugging Face Space

on:
  push:
    branches: [main, master] # Se déclenche lors d'un push sur main ou master
  
  # Permet de lancer l'action manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  deploy-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # ⚠️ REMPLACEZ CES VALEURS PAR LES VÔTRES ⚠️
          HF_USERNAME: "JeanProjets"
          SPACE_NAME: "Projet_10"
        run: |
          # On se place dans le dossier contenant l'app Streamlit
          cd hf_space
          
          # On initialise un nouveau repo git juste pour ce dossier
          git init
          git checkout -b main
          git add .
          git commit -m "Deploy from GitHub Actions"
          
          # On force le push sur Hugging Face (écrase l'ancien code du Space)
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME main
